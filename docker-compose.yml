version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scc-backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/callback}
      - ALLOWED_USERS=${ALLOWED_USERS:-youssef.mahtat.as.developer@gmail.com,spopoclaw@gmail.com}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
      - ENV=production
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - scc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - scc-network

  caddy:
    image: caddy:2-alpine
    container_name: scc-caddy
    restart: unless-stopped
    ports:
      - "${SCC_PORT:-8443}:443"
      - "${SCC_HTTP_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - scc-network

networks:
  scc-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
